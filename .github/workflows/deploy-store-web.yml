name: Deploy Flutter Web (store)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.FRONTEND_API_BASE_URL != '' && secrets.FRONTEND_API_BASE_URL || vars.FRONTEND_API_BASE_URL != '' && vars.FRONTEND_API_BASE_URL || 'https://medichain-backend.onrender.com/api/v1' }}
    defaults:
      run:
        working-directory: store

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /store/ --dart-define=API_BASE_URL=$API_BASE_URL

      - name: Add SPA fallback for GitHub Pages
        run: cp build/web/index.html build/web/404.html

      - name: Disable Jekyll processing
        run: touch build/web/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: store/build/web
          publish_branch: gh-pages
          force_orphan: true
          keep_files: false
