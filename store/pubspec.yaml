name: store
description: Modern clothing store application
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  lottie: ^2.7.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  carousel_slider: ^5.1.2
  smooth_page_indicator: ^1.1.0
  flutter_rating_bar: ^4.0.1
  photo_view: ^0.14.0
  
  # State Management
  provider: ^6.0.5
  
  # Networking
  dio: ^5.3.2
  retrofit: ^4.1.0
  json_annotation: ^4.9.0
  
  # Local Storage
  shared_preferences: ^2.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Payment
  flutter_stripe: ^9.4.0
  
  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.0
  image_picker: ^1.0.4
  mobile_scanner: ^7.1.1
  qr_flutter: ^4.1.0
  path_provider: ^2.1.1
  
  # Navigation
  go_router: ^12.0.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.6
  build_runner_core: ^9.3.2
  json_serializable: ^6.7.1
  retrofit_generator: ^10.2.3
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#2E5BFF"
  
